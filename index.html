<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengajuan ATK Kantor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        .atk-image { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; transition: all 0.3s; }
        .atk-image.grayscale { filter: grayscale(100%); }
        .mood-emoji { font-size: 3.8rem; transition: all 0.3s ease; }
        .mood-emoji:hover { transform: scale(1.25) rotate(10deg); }
        .toast { animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .sticky-cart {
            position: sticky;
            top: 100px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        /* Responsive improvements */
        @media (max-width: 1024px) {
            .sticky-cart {
                position: relative;
                top: 0;
                max-height: none;
            }
            .atk-image { height: 140px; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- MENU UTAMA -->
    <div id="page-role" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-600 to-blue-700 p-6">
        <div class="text-center max-w-3xl w-full">
            <div class="flex justify-center mb-6">
                <i class="fa-solid fa-building-columns text-white text-5xl"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-6">Sistem Pengajuan ATK</h1>
            <p class="text-indigo-100 text-lg mb-5">Bagaimana mood kamu hari ini?</p>

            <div class="grid grid-cols-5 gap-6 mb-10 justify-center">
                <div onclick="showMoodMessage('joyful')" class="cursor-pointer group flex flex-col items-center">
                    <div class="mood-emoji drop-shadow-2xl">😆</div>
                    <p class="text-white mt-3 font-medium">Joyful</p>
                </div>
                <div onclick="showMoodMessage('happy')" class="cursor-pointer group flex flex-col items-center">
                    <div class="mood-emoji drop-shadow-2xl">😊</div>
                    <p class="text-white mt-3 font-medium">Happy</p>
                </div>
                <div onclick="showMoodMessage('relaxed')" class="cursor-pointer group flex flex-col items-center">
                    <div class="mood-emoji drop-shadow-2xl">😌</div>
                    <p class="text-white mt-3 font-medium">Relaxed</p>
                </div>
                <div onclick="showMoodMessage('sad')" class="cursor-pointer group flex flex-col items-center">
                    <div class="mood-emoji drop-shadow-2xl">😢</div>
                    <p class="text-white mt-3 font-medium">Sad</p>
                </div>
                <div onclick="showMoodMessage('angry')" class="cursor-pointer group flex flex-col items-center">
                    <div class="mood-emoji drop-shadow-2xl">😠</div>
                    <p class="text-white mt-3 font-medium">Angry</p>
                </div>
            </div>

            <p class="text-indigo-100 text-lg mb-6">Pilih peran Anda</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-xl mx-auto">
                <div onclick="pilihRole('pengaju')" class="bg-white rounded-3xl p-8 cursor-pointer hover:shadow-2xl transition-all card-hover">
                    <i class="fa-solid fa-user text-indigo-600 text-4xl mb-4"></i>
                    <h3 class="text-2xl font-semibold text-gray-800">Pengaju</h3>
                    <p class="text-gray-500 mt-1 text-sm">Ajukan kebutuhan ATK</p>
                </div>
                <div onclick="showAdminLogin()" class="bg-white rounded-3xl p-8 cursor-pointer hover:shadow-2xl transition-all card-hover">
                    <i class="fa-solid fa-shield-halved text-emerald-600 text-4xl mb-4"></i>
                    <h3 class="text-2xl font-semibold text-gray-800">Admin</h3>
                    <p class="text-gray-500 mt-1 text-sm">Kelola ATK & Approval</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MOOD POPUP -->
    <div id="mood-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[300]">
        <div class="bg-white rounded-3xl max-w-xs w-full mx-4 p-6 text-center shadow-2xl">
            <div id="mood-emoji-big" class="text-7xl mb-4"></div>
            <h3 id="mood-title" class="text-xl font-semibold mb-2"></h3>
            <p id="mood-message" class="text-gray-600 text-sm leading-relaxed"></p>
            <button onclick="hideMoodModal()" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-2xl font-semibold transition">Tutup</button>
        </div>
    </div>

    <!-- NAVBAR -->
    <div id="navbar" class="hidden bg-white border-b sticky top-0 z-50 shadow">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex gap-10 text-lg font-medium">
                <span onclick="pilihRole('pengaju')" class="cursor-pointer hover:text-indigo-600 flex items-center gap-2">
                    <i class="fa-solid fa-user"></i> Pengaju
                </span>
                <span id="admin-nav" onclick="pilihRole('admin')" class="cursor-pointer hover:text-emerald-600 flex items-center gap-2 hidden">
                    <i class="fa-solid fa-shield-halved"></i> Admin
                </span>
            </div>
            <button onclick="logout()" class="flex items-center gap-2 text-gray-500 hover:text-red-600">
                <i class="fa-solid fa-right-from-bracket"></i> Keluar
            </button>
        </div>
    </div>

    <!-- HALAMAN PENGAJU -->
    <div id="pengaju-page" class="hidden min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <h1 class="text-3xl font-bold mb-2">Pengajuan ATK</h1>
            <p id="nama-pengaju-header" class="text-gray-500 mb-8 min-h-[24px]"></p>

            <div id="nama-form" class="bg-white rounded-3xl p-6 sm:p-8 shadow mb-10">
                <h2 class="text-xl font-semibold mb-6">Data Pengaju</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-3">Nama Lengkap <span class="text-red-500">*</span></label>
                        <input id="nama-input" type="text" placeholder="Masukkan nama lengkap Anda..." class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-3">Bagian / Unit Kerja <span class="text-red-500">*</span></label>
                        <input id="bagian-input" type="text" placeholder="Contoh: Keuangan, IT, HRD" class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
                    </div>
                </div>
                <div class="mt-8 flex justify-end">
                    <button onclick="simpanNamaDanLanjut()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-semibold flex items-center gap-3 text-lg">
                        <i class="fa-solid fa-arrow-right"></i> Simpan & Lanjut Pilih ATK
                    </button>
                </div>
            </div>

            <div id="pilih-atk-section" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <!-- Grid ATK -->
                    <div class="lg:col-span-8">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-semibold">Pilih ATK</h2>
                            <div class="relative w-full max-w-xs">
                                <input id="search-input" type="text" placeholder="Cari nama ATK..." onkeyup="cariATK()" 
                                       class="w-full px-5 py-4 pl-12 border border-gray-300 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg">
                                <i class="fa-solid fa-magnifying-glass absolute left-5 top-4.5 text-gray-400"></i>
                            </div>
                        </div>
                        <div id="grid-atk" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
                    </div>

                    <!-- Cart -->
                    <div class="lg:col-span-4">
                        <div class="sticky-cart bg-white rounded-3xl shadow p-6">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="text-xl font-semibold flex items-center gap-2">
                                    <i class="fa-solid fa-cart-shopping text-indigo-600"></i>
                                    Keranjang Pengajuan
                                </h3>
                                <span id="cart-count" class="bg-indigo-100 text-indigo-700 text-sm font-medium px-3 py-1 rounded-full">0 barang</span>
                            </div>
                            
                            <div id="cart-items" class="max-h-[420px] overflow-y-auto space-y-4 mb-6"></div>

                            <div class="border-t pt-4">
                                <div class="flex justify-between text-lg font-semibold mb-4">
                                    <span>Total Barang</span>
                                    <span id="cart-total-qty">0</span>
                                </div>
                                <button onclick="showKonfirmasiPengajuan()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold flex items-center justify-center gap-3">
                                    <i class="fa-solid fa-paper-plane"></i> Konfirmasi & Submit
                                </button>
                                <button onclick="resetCart()" class="w-full mt-3 text-red-600 hover:text-red-700 font-medium py-3 text-sm">
                                    Kosongkan Keranjang
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] space-y-3"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqYpGpNK6iuvxb-Z4NQqMu8v30xULmkfxPUOh77lIqH4mto51nsCq3XRL8J3jOWdDY_w/exec";

        let currentRole = null;
        let namaPengajuSaatIni = "";
        let bagianPengaju = "";
        let isAdminLoggedIn = false;
        let atkList = [];

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast flex items-center gap-3 px-5 py-4 rounded-2xl shadow-xl text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-xmark'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showMoodMessage(mood) {
            const modal = document.getElementById('mood-modal');
            const emojiEl = document.getElementById('mood-emoji-big');
            const titleEl = document.getElementById('mood-title');
            const msgEl = document.getElementById('mood-message');

            let emoji = "", title = "", message = "";
            switch(mood) {
                case 'joyful': emoji = "😆"; title = "Joyful!"; message = "Wah! Mood Joyful hari ini!"; break;
                case 'happy': emoji = "😊"; title = "Happy!"; message = "Senang mendengarnya!"; break;
                case 'relaxed': emoji = "😌"; title = "Relaxed"; message = "Alhamdulillah bisa tenang 😊"; break;
                case 'sad': emoji = "😢"; title = "Semangat!"; message = "Semoga segera membaik ❤️"; break;
                case 'angry': emoji = "😠"; title = "Bimsalabim..."; message = "AYOK NGAMOOKK! 💪"; break;
            }
            emojiEl.textContent = emoji;
            titleEl.textContent = title;
            msgEl.textContent = message;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideMoodModal() {
            const modal = document.getElementById('mood-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function pilihRole(role) {
            currentRole = role;
            document.getElementById('page-role').classList.add('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            if (role === 'pengaju') {
                document.getElementById('pengaju-page').classList.remove('hidden');
                resetPengajuForm();
            }
        }

        function logout() {
            if (confirm("Kembali ke menu utama?")) location.reload();
        }

        function simpanNamaDanLanjut() {
            const nama = document.getElementById('nama-input').value.trim();
            const bagian = document.getElementById('bagian-input').value.trim();
            if (!nama) return showToast("Mohon isi Nama Lengkap!", "error");
            if (!bagian) return showToast("Mohon isi Bagian / Unit Kerja!", "error");

            namaPengajuSaatIni = nama;
            bagianPengaju = bagian;
            document.getElementById('nama-pengaju-header').innerHTML = `Pengaju: <span class="font-semibold">${nama}</span> | Bagian: <span class="font-semibold">${bagian}</span>`;

            document.getElementById('nama-form').classList.add('hidden');
            document.getElementById('pilih-atk-section').classList.remove('hidden');
            renderPengajuGrid();
        }

        function resetPengajuForm() {
            document.getElementById('nama-form').classList.remove('hidden');
            document.getElementById('pilih-atk-section').classList.add('hidden');
            document.getElementById('nama-input').value = '';
            document.getElementById('bagian-input').value = '';
            document.getElementById('nama-pengaju-header').innerHTML = '';
            namaPengajuSaatIni = "";
            bagianPengaju = "";
            atkList.forEach(i => i.qty = 0);
            renderCart();
        }

        async function loadATKFromSheet() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now());
                if (res.ok) atkList = await res.json();
            } catch (e) {
                console.error("Gagal load ATK:", e);
            }
            renderPengajuGrid();
        }

        function renderPengajuGrid(filteredList = null) {
            const list = filteredList || atkList;
            const container = document.getElementById('grid-atk');
            container.innerHTML = '';

            list.forEach(item => {
                const stok = parseInt(item.stok) || 0;
                const isDisabled = stok <= 0;
                const div = document.createElement('div');
                div.className = `bg-white rounded-3xl overflow-hidden card-hover p-5 ${isDisabled ? 'opacity-75' : ''}`;
                div.innerHTML = `
                    <img src="${item.gambar}" class="atk-image ${isDisabled ? 'grayscale' : ''}" onerror="this.src='https://picsum.photos/id/237/300/300'">
                    <h4 class="font-semibold text-lg mb-2 mt-3">${item.nama}</h4>
                    <p class="text-sm mb-4">Stok: <span class="${isDisabled ? 'text-red-500' : 'text-emerald-600'} font-semibold">${stok}</span></p>
                    <div class="flex items-center justify-center gap-6 mb-6">
                        <button onclick="ubahQty('${item.id}', -1)" class="w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-2xl text-3xl ${isDisabled ? 'opacity-30 cursor-not-allowed' : ''}">-</button>
                        <span id="qty-${item.id}" class="text-3xl font-bold w-12 text-center">${item.qty || 0}</span>
                        <button onclick="ubahQty('${item.id}', 1)" class="w-10 h-10 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-3xl ${isDisabled ? 'opacity-30 cursor-not-allowed' : ''}">+</button>
                    </div>
                    <input id="alasan-${item.id}" type="text" placeholder="Alasan pengajuan..." class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-sm focus:outline-none focus:border-indigo-500" ${isDisabled ? 'disabled' : ''}>
                `;
                container.appendChild(div);
            });
        }

        function ubahQty(id, delta) {
            const item = atkList.find(i => i.id === id);
            if (!item) return;
            let qty = (item.qty || 0) + delta;
            if (qty < 0) qty = 0;
            if (qty > (item.stok || 0)) qty = item.stok || 0;
            item.qty = qty;
            document.getElementById(`qty-${id}`).textContent = qty;
            renderCart();
        }

        function cariATK() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = keyword ? atkList.filter(item => item.nama.toLowerCase().includes(keyword)) : null;
            renderPengajuGrid(filtered);
        }

        function renderCart() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const totalQtyEl = document.getElementById('cart-total-qty');
            const selected = atkList.filter(i => (i.qty || 0) > 0);
            cartCount.textContent = `${selected.length} barang`;
            totalQtyEl.textContent = selected.reduce((sum, i) => sum + (i.qty || 0), 0);

            if (selected.length === 0) {
                cartItems.innerHTML = `<div class="text-center py-12 text-gray-400"><i class="fa-solid fa-cart-shopping text-4xl mb-3"></i><p>Keranjang masih kosong</p></div>`;
                return;
            }

            let html = '';
            selected.forEach(item => {
                html += `<div class="flex gap-3 bg-gray-50 rounded-2xl p-3"><div class="flex-1"><p class="font-medium text-sm">${item.nama}</p><p class="text-xs text-gray-500">Qty: <span class="font-semibold">${item.qty}</span></p></div><button onclick="ubahQty('${item.id}', -${item.qty}); event.stopImmediatePropagation()" class="text-red-500 hover:text-red-700 text-xl">×</button></div>`;
            });
            cartItems.innerHTML = html;
        }

        function showKonfirmasiPengajuan() {
            if (!namaPengajuSaatIni || !bagianPengaju) return showToast("Mohon isi nama dan bagian terlebih dahulu!", "error");
            const selected = atkList.filter(i => (i.qty || 0) > 0);
            if (selected.length === 0) return showToast("Pilih minimal 1 barang ATK!", "error");
            if (confirm("Kirim pengajuan ini?")) ajukanPengajuan();
        }

        async function ajukanPengajuan() {
            const selected = atkList.filter(i => (i.qty || 0) > 0);
            if (selected.length === 0) return;

            const payload = selected.map(item => ({
                nama_pengaju: namaPengajuSaatIni,
                bagian: bagianPengaju,
                tanggal: new Date().toLocaleString('id-ID'),
                nama_barang: item.nama,
                jumlah: item.qty,
                alasan: document.getElementById(`alasan-${item.id}`) ? document.getElementById(`alasan-${item.id}`).value.trim() || "-" : "-",
                action: "submit_pengajuan"
            }));

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                showToast("✅ Pengajuan berhasil dikirim!");
                resetPengajuForm();
            } catch (e) {
                showToast("Gagal mengirim pengajuan.", "error");
            }
        }

        function resetCart() {
            if (confirm("Kosongkan semua barang di keranjang?")) {
                atkList.forEach(i => i.qty = 0);
                renderPengajuGrid();
                renderCart();
            }
        }

        window.onload = () => {
            loadATKFromSheet();
        };
    </script>
</body>
</html>
